name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  static:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Calibrate simulator
        run: npm run calibrate

      - name: Audit calibration corpus
        run: npm run calibration:corpus

      - name: Report calibration matrix
        run: npm run calibration:matrix

      - name: Verify CLI
        run: |
          node dist/cli/index.js --help
          node dist/cli/index.js profiles
          node dist/cli/index.js calibration-report --help

      - name: Verify MCP server construction
        run: node --input-type=module -e "import { createMcpServer } from './dist/mcp/index.js'; if (!createMcpServer()) throw new Error('MCP server failed to construct')"

  vitest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
        shard:
          - core
          - capture
          - playwright-platform
          - playwright-probes
          - playwright-exploration
          - pipeline

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Vitest shard
        run: npm run test:shard -- ${{ matrix.shard }}
