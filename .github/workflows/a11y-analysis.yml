name: Accessibility Analysis

# Reusable workflow — other repos can call this to analyze their pages.
# Builds Tactual from source at the pinned ref below (bumped per release).
# Use this when the published npm package lags a fix you need, or when you
# want reproducibility against an exact source revision rather than whatever
# npm currently resolves. Most users should prefer the composite action at
# action.yml (uses the published npm package). See README for the distinction.
#
# Usage in another repo's workflow:
#
#   jobs:
#     a11y:
#       uses: tactual-dev/tactual/.github/workflows/a11y-analysis.yml@main
#       with:
#         url: https://your-app.example.com
#         profile: nvda-desktop-v0
#         explore: true
#         probe: true
#         probe-mode: standard

on:
  workflow_call:
    inputs:
      url:
        description: URL to analyze
        required: true
        type: string
      profile:
        description: AT profile to use
        required: false
        type: string
        default: generic-mobile-web-sr-v0
      explore:
        description: Explore hidden branches
        required: false
        type: boolean
        default: false
      probe:
        description: Opt-in runtime keyboard probes (focus, activation, Escape, Tab)
        required: false
        type: boolean
        default: false
      probe-mode:
        description: Probe depth preset (fast | standard | deep)
        required: false
        type: string
        default: standard
      stealth:
        description: Apply anti-bot-detection defaults
        required: false
        type: boolean
        default: false
      channel:
        description: Browser channel (chrome, chrome-beta, msedge)
        required: false
        type: string
        default: ""
      wait-for-selector:
        description: CSS selector to wait for before capturing (for SPAs)
        required: false
        type: string
        default: ""
      format:
        description: Output format (json, markdown, console, sarif)
        required: false
        type: string
        default: sarif
      fail-below:
        description: Fail if average score is below this threshold
        required: false
        type: number
        default: 0

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Tactual
        uses: actions/checkout@v4
        with:
          repository: tactual-dev/tactual
          ref: v0.4.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Run analysis
        id: analysis
        # Pass inputs via env: so bash sees quoted values. Direct ${{ }}
        # substitution inside `run:` is replaced at render-time and lets
        # injection slip through.
        env:
          TACTUAL_URL: ${{ inputs.url }}
          TACTUAL_PROFILE: ${{ inputs.profile }}
          TACTUAL_FORMAT: ${{ inputs.format }}
          TACTUAL_EXPLORE: ${{ inputs.explore }}
          TACTUAL_PROBE: ${{ inputs.probe }}
          TACTUAL_PROBE_MODE: ${{ inputs.probe-mode }}
          TACTUAL_STEALTH: ${{ inputs.stealth }}
          TACTUAL_CHANNEL: ${{ inputs.channel }}
          TACTUAL_WAIT_FOR_SELECTOR: ${{ inputs.wait-for-selector }}
        run: |
          # Build CLI args as an array so values with spaces and shell
          # metacharacters can't break out of their argument boundary.
          ARGS=(analyze-url "$TACTUAL_URL"
                --profile "$TACTUAL_PROFILE"
                --format "$TACTUAL_FORMAT")

          [ "$TACTUAL_EXPLORE" = "true" ] && ARGS+=(--explore)
          [ "$TACTUAL_PROBE" = "true" ] && ARGS+=(--probe)
          [ "$TACTUAL_STEALTH" = "true" ] && ARGS+=(--stealth)
          [ -n "$TACTUAL_CHANNEL" ] && ARGS+=(--channel "$TACTUAL_CHANNEL")
          [ -n "$TACTUAL_WAIT_FOR_SELECTOR" ] && ARGS+=(--wait-for-selector "$TACTUAL_WAIT_FOR_SELECTOR")
          if [ -n "$TACTUAL_PROBE_MODE" ] && [ "$TACTUAL_PROBE_MODE" != "standard" ]; then
            ARGS+=(--probe-mode "$TACTUAL_PROBE_MODE")
          fi

          EXT="txt"
          if [ "$TACTUAL_FORMAT" = "sarif" ]; then EXT="sarif"; fi
          if [ "$TACTUAL_FORMAT" = "json" ]; then EXT="json"; fi
          if [ "$TACTUAL_FORMAT" = "markdown" ]; then EXT="md"; fi
          RESULT_FILE="results.${EXT}"
          ARGS+=(--output "$RESULT_FILE")

          # --also-json eliminates the second Playwright run when the user
          # requested a non-JSON primary format. Needed for threshold check.
          if [ "$TACTUAL_FORMAT" != "json" ]; then
            ARGS+=(--also-json results.json)
          fi

          node dist/cli/index.js "${ARGS[@]}"

          # If primary format was JSON, results.json IS the primary output
          if [ "$TACTUAL_FORMAT" = "json" ]; then cp "$RESULT_FILE" results.json; fi

      - name: Check score threshold
        if: inputs.fail-below > 0
        env:
          THRESHOLD: ${{ inputs.fail-below }}
        run: |
          AVG=$(node -e '
            const r = JSON.parse(require("fs").readFileSync("results.json", "utf8"));
            console.log(r.stats?.averageScore ?? 0);
          ')
          echo "Average score: $AVG"
          BELOW=$(node -e '
            const avg = Number(process.argv[1]);
            const th = Number(process.env.THRESHOLD);
            console.log(avg < th ? "1" : "0");
          ' "$AVG")
          if [ "$BELOW" = "1" ]; then
            echo "::error::Average score $AVG is below threshold $THRESHOLD"
            exit 1
          fi

      - name: Upload SARIF results
        if: inputs.format == 'sarif' && always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: tactual-a11y

      - name: Upload analysis artifact
        uses: actions/upload-artifact@v4
        with:
          name: tactual-analysis
          path: results.*
