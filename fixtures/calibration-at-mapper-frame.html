<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Embedded Calibration Frame</title>
</head>
<body>
  <main aria-label="Embedded checkout">
    <h2>Embedded checkout</h2>
    <p id="card-help">Use the test card number shown by the payment provider.</p>
    <label for="card-number">Card number</label>
    <input id="card-number" inputmode="numeric" autocomplete="cc-number" aria-describedby="card-help" value="4242">
    <button type="button">Confirm embedded payment</button>
    <a href="#embedded-terms">Embedded payment terms</a>
  </main>
</body>
</html>
