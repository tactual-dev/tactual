name: "Tactual Accessibility Analysis"
description: "Screen-reader navigation cost analysis. Scores how hard it is for AT users to find, reach, and operate web content."
author: "Ben Matar"

branding:
  icon: "eye"
  color: "blue"

inputs:
  url:
    description: "URL to analyze"
    required: true
  profile:
    description: "AT profile ID (generic-mobile-web-sr-v0, nvda-desktop-v0, jaws-desktop-v0, voiceover-ios-v0, talkback-android-v0)"
    required: false
    default: "generic-mobile-web-sr-v0"
  explore:
    description: "Explore hidden branches (menus, tabs, dialogs, disclosures)"
    required: false
    default: "false"
  format:
    description: "Output format: json, markdown, console, sarif"
    required: false
    default: "sarif"
  fail-below:
    description: "Fail if average score is below this threshold (0 to disable)"
    required: false
    default: "0"
  comment-on-pr:
    description: "Post a summary comment on pull requests (requires GITHUB_TOKEN with pull-requests: write)"
    required: false
    default: "false"
  node-version:
    description: "Node.js version to use"
    required: false
    default: "22"

outputs:
  average-score:
    description: "Average accessibility score across all targets"
    value: ${{ steps.analysis.outputs.average-score }}
  result-file:
    description: "Path to the analysis result file"
    value: ${{ steps.analysis.outputs.result-file }}

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install Tactual and Playwright
      shell: bash
      run: |
        npm install tactual@0.3.0 playwright
        npx playwright install chromium --with-deps

    - name: Run analysis
      id: analysis
      shell: bash
      run: |
        EXPLORE_FLAG=""
        if [ "${{ inputs.explore }}" = "true" ]; then
          EXPLORE_FLAG="--explore"
        fi

        FORMAT="${{ inputs.format }}"

        # Single analysis run — produce the user's format + JSON sidecar for score extraction.
        # --also-json writes JSON from the same analysis without a second Playwright capture.
        EXT="txt"
        if [ "$FORMAT" = "sarif" ]; then EXT="sarif"; fi
        if [ "$FORMAT" = "json" ]; then EXT="json"; fi
        if [ "$FORMAT" = "markdown" ]; then EXT="md"; fi
        RESULT_FILE="tactual-results.${EXT}"

        ALSO_JSON_FLAG=""
        if [ "$FORMAT" != "json" ]; then
          ALSO_JSON_FLAG="--also-json tactual-results.json"
        fi

        npx tactual analyze-url "${{ inputs.url }}" \
          --profile "${{ inputs.profile }}" \
          --format "$FORMAT" \
          $EXPLORE_FLAG \
          --output "$RESULT_FILE" \
          $ALSO_JSON_FLAG

        echo "result-file=${RESULT_FILE}" >> "$GITHUB_OUTPUT"

        JSON_FILE="tactual-results.json"
        if [ "$FORMAT" = "json" ]; then
          JSON_FILE="$RESULT_FILE"
        fi

        AVG=$(node -e "
          const r = JSON.parse(require('fs').readFileSync('${JSON_FILE}','utf8'));
          console.log(r.stats?.averageScore ?? 0);
        ")
        echo "average-score=${AVG}" >> "$GITHUB_OUTPUT"
        echo "Average score: ${AVG}"

    - name: Check score threshold
      if: inputs.fail-below != '0'
      shell: bash
      run: |
        AVG="${{ steps.analysis.outputs.average-score }}"
        THRESHOLD="${{ inputs.fail-below }}"
        BELOW=$(node -e "console.log(Number('$AVG') < Number('$THRESHOLD') ? '1' : '0')")
        if [ "$BELOW" = "1" ]; then
          echo "::error::Average score $AVG is below threshold $THRESHOLD"
          exit 1
        fi

    - name: Upload SARIF results
      if: inputs.format == 'sarif' && always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: tactual-results.sarif
        category: tactual-a11y

    - name: Post PR comment
      if: inputs.comment-on-pr == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        if [ ! -f "tactual-results.json" ]; then
          echo "No JSON results available for PR comment"
          exit 0
        fi

        AVG="${{ steps.analysis.outputs.average-score }}"
        URL="${{ inputs.url }}"
        PROFILE="${{ inputs.profile }}"

        COMMENT=$(node "${{ github.action_path }}/scripts/pr-comment.js" \
          tactual-results.json "$AVG" "$URL" "$PROFILE")

        # Find existing comment for this URL+profile, or create new one
        # Use | separator (URLs contain : but rarely |); strip HTML-breaking chars
        PR_NUM="${{ github.event.pull_request.number }}"
        MARKER="tactual-pr-comment|$(printf '%s' "$URL" | sed 's/[<>|]//g')|$(printf '%s' "$PROFILE" | sed 's/[<>|]//g')"
        EXISTING=$(gh api "repos/${{ github.repository }}/issues/${PR_NUM}/comments" \
          --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" \
          2>/dev/null | head -1)

        if [ -n "$EXISTING" ]; then
          gh api "repos/${{ github.repository }}/issues/comments/${EXISTING}" \
            -X PATCH -f body="$COMMENT"
        else
          gh pr comment "$PR_NUM" --body "$COMMENT"
        fi

    - name: Upload analysis artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: tactual-analysis
        path: tactual-results.*
