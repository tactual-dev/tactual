name: "Tactual Accessibility Analysis"
description: "Screen-reader navigation cost analysis. Scores how hard it is for AT users to find, reach, and operate web content."
author: "Ben Matar"

branding:
  icon: "eye"
  color: "blue"

inputs:
  url:
    description: "URL to analyze"
    required: true
  profile:
    description: "AT profile ID (generic-mobile-web-sr-v0, nvda-desktop-v0, jaws-desktop-v0, voiceover-ios-v0, talkback-android-v0)"
    required: false
    default: "generic-mobile-web-sr-v0"
  explore:
    description: "Explore hidden branches (menus, tabs, dialogs, disclosures)"
    required: false
    default: "false"
  format:
    description: "Output format: json, markdown, console, sarif"
    required: false
    default: "sarif"
  fail-below:
    description: "Fail if average score is below this threshold (0 to disable)"
    required: false
    default: "0"
  comment-on-pr:
    description: "Post a summary comment on pull requests (requires GITHUB_TOKEN with pull-requests: write)"
    required: false
    default: "false"
  node-version:
    description: "Node.js version to use"
    required: false
    default: "22"

outputs:
  average-score:
    description: "Average accessibility score across all targets"
    value: ${{ steps.analysis.outputs.average-score }}
  result-file:
    description: "Path to the analysis result file"
    value: ${{ steps.analysis.outputs.result-file }}

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install Tactual and Playwright
      shell: bash
      run: |
        npm install tactual@0.3.0 playwright
        npx playwright install chromium --with-deps

    - name: Run analysis
      id: analysis
      shell: bash
      run: |
        EXPLORE_FLAG=""
        if [ "${{ inputs.explore }}" = "true" ]; then
          EXPLORE_FLAG="--explore"
        fi

        EXT="txt"
        if [ "${{ inputs.format }}" = "sarif" ]; then EXT="sarif"; fi
        if [ "${{ inputs.format }}" = "json" ]; then EXT="json"; fi
        RESULT_FILE="tactual-results.${EXT}"

        npx tactual analyze-url "${{ inputs.url }}" \
          --profile "${{ inputs.profile }}" \
          --format "${{ inputs.format }}" \
          $EXPLORE_FLAG \
          --output "$RESULT_FILE"

        echo "result-file=${RESULT_FILE}" >> "$GITHUB_OUTPUT"

        # Generate JSON for score extraction (skip if already JSON)
        if [ "${{ inputs.format }}" != "json" ]; then
          npx tactual analyze-url "${{ inputs.url }}" \
            --profile "${{ inputs.profile }}" \
            $EXPLORE_FLAG \
            --format json \
            --output tactual-results.json
        fi

        AVG=$(node -e "
          const r = JSON.parse(require('fs').readFileSync('tactual-results.json','utf8'));
          console.log(r.stats?.averageScore ?? 0);
        ")
        echo "average-score=${AVG}" >> "$GITHUB_OUTPUT"
        echo "Average score: ${AVG}"

    - name: Check score threshold
      if: inputs.fail-below != '0'
      shell: bash
      run: |
        AVG="${{ steps.analysis.outputs.average-score }}"
        THRESHOLD="${{ inputs.fail-below }}"
        BELOW=$(node -e "console.log(Number('$AVG') < Number('$THRESHOLD') ? '1' : '0')")
        if [ "$BELOW" = "1" ]; then
          echo "::error::Average score $AVG is below threshold $THRESHOLD"
          exit 1
        fi

    - name: Upload SARIF results
      if: inputs.format == 'sarif' && always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: tactual-results.sarif
        category: tactual-a11y

    - name: Post PR comment
      if: inputs.comment-on-pr == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        AVG="${{ steps.analysis.outputs.average-score }}"
        RESULT_FILE="tactual-results.json"

        # Build the comment body
        COMMENT=$(node -e "
          const r = JSON.parse(require('fs').readFileSync('${RESULT_FILE}','utf8'));
          const s = r.metadata || {};
          const findings = r.findings || [];
          const severe = findings.filter(f => f.severity === 'severe').length;
          const high = findings.filter(f => f.severity === 'high').length;
          const moderate = findings.filter(f => f.severity === 'moderate').length;
          const avg = ${AVG};

          let icon = '🟢';
          if (severe > 0) icon = '🔴';
          else if (high > 0) icon = '🟠';
          else if (moderate > 0) icon = '🟡';

          const lines = [];
          lines.push('## ' + icon + ' Tactual: Screen-Reader Navigation Cost');
          lines.push('');
          lines.push('| Metric | Value |');
          lines.push('|---|---|');
          lines.push('| Average Score | **' + avg + '** / 100 |');
          lines.push('| Targets | ' + (s.targetCount || findings.length) + ' |');
          lines.push('| Profile | \`' + (s.profile || 'generic-mobile-web-sr-v0') + '\` |');
          if (severe + high + moderate > 0) {
            lines.push('');
            lines.push('**Findings:** ' + severe + ' severe, ' + high + ' high, ' + moderate + ' moderate');
          }
          const worst = findings.slice(0, 3);
          if (worst.length > 0) {
            lines.push('');
            lines.push('**Worst targets:**');
            for (const f of worst) {
              lines.push('- \`' + f.targetId + '\` — ' + f.scores.overall + '/100 [' + f.severity + ']');
            }
          }
          lines.push('');
          lines.push('<sub>Posted by [Tactual](https://github.com/tactual-dev/tactual) · Screen-reader navigation cost analyzer</sub>');
          console.log(lines.join('\n'));
        ")

        # Find and update existing comment, or create new one
        PR_NUM="${{ github.event.pull_request.number }}"
        EXISTING=$(gh api "repos/${{ github.repository }}/issues/${PR_NUM}/comments" \
          --jq '.[] | select(.body | contains("Tactual: Screen-Reader Navigation Cost")) | .id' \
          2>/dev/null | head -1)

        if [ -n "$EXISTING" ]; then
          gh api "repos/${{ github.repository }}/issues/comments/${EXISTING}" \
            -X PATCH -f body="$COMMENT"
        else
          gh pr comment "$PR_NUM" --body "$COMMENT"
        fi

    - name: Upload analysis artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: tactual-analysis
        path: tactual-results.*
